<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskPro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>TaskPro</h1>
      <p>Organize suas tarefas do dia</p>
    </header>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Nova tarefa..." maxlength="100" />
      <button id="addBtn">Adicionar</button>
    </div>

    <ul id="taskList"></ul>

    <p id="emptyMsg">Nenhuma tarefa ainda. Adicione uma acima!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
